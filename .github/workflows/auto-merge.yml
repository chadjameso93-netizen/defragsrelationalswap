name: Auto Merge PRs

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
  check_suite:
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

  refresh-auto-merge:
    if: github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Re-enable auto-merge for open PRs targeting main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh pr list --repo "$REPO" --state open --base main --json url,isDraft | \
          jq -r '.[] | select(.isDraft == false) | .url' | \
          while read -r pr; do
            gh pr merge --auto --squash "$pr" || true
          done
